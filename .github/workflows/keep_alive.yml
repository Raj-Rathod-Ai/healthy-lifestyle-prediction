name: Keep Streamlit App Alive

on:
  schedule:
    - cron: '0 0 * * *' # Runs every day at midnight UTC
  workflow_dispatch: # Allows manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Send keep-alive ping
        run: |
          if [ -z "${{ secrets.APP_URL }}" ]; then
            echo "APP_URL secret is not set. Please add the APP_URL secret in your repository Settings -> Secrets and variables -> Actions to keep your deployed Streamlit app awake."
            exit 0
          fi
          curl -I -s "${{ secrets.APP_URL }}"
